services:
  db:
    image: postgres:16-alpine
    container_name: smartplant-db
    environment:
      POSTGRES_DB: smartplant
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d smartplant"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./smartplant-backend
    container_name: smartplant-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/smartplant
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./smartplant-frontend
    container_name: smartplant-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  postgres_data: